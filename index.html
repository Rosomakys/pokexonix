<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PokéXonix Evolution - Final</title>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; color: #ffeb3b; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; }
        .ui-panel { display: flex; gap: 40px; margin: 15px; font-size: 24px; background: rgba(255, 255, 255, 0.1); padding: 10px 30px; border-radius: 50px; border: 2px solid #f44336; box-shadow: 0 0 20px rgba(244, 67, 54, 0.5); }
        #game-container { position: relative; }
        canvas { border: 8px solid #f44336; border-radius: 15px; background: #000; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; border-radius: 10px; }
        .btn { padding: 20px 50px; font-size: 28px; cursor: pointer; background: #f44336; color: #fff; border: none; border-radius: 15px; font-weight: bold; box-shadow: 0 5px 0 #b71c1c; transition: 0.1s; }
        .btn:active { transform: translateY(5px); box-shadow: 0 0 0 #b71c1c; }
        h1 { font-size: 60px; color: #f44336; margin: 0; text-shadow: 4px 4px 0 #fff; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div>LVL: <span id="cur-lvl">1</span></div>
        <div>⏱ <span id="timer">60</span>s</div>
        <div>⚡ <span id="charge">PŘIPRAVEN</span></div>
        <div>🏆 <span id="percent">0</span>%</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div id="overlay">
            <h1 id="headline">POKÉ-XONIX</h1>
            <p id="sub-msg" style="font-size: 24px; color: #fff;">PŘIPRAV SE NA LOV!</p>
            <button class="btn" onclick="startGame()">START</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const percentEl = document.getElementById('percent'), timerEl = document.getElementById('timer');
const chargeEl = document.getElementById('charge'), overlay = document.getElementById('overlay');

const pokeGallery = [
    "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png",
    "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png",
    "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png",
    "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png",
    "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png", // Snorlax
    "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png"
];

const currentImg = new Image();
let currentLevel = 1, timeLeft = 60, gameActive = false, canZap = true, showFullArt = false;
let grid, player, enemies, drawing, timerInt;
const SIZE = 10, W = canvas.width / SIZE, H = canvas.height / SIZE;

function initGrid() {
    grid = Array(W).fill().map(() => Array(H).fill(0));
    for(let i=0; i<W; i++) { grid[i][0] = 1; grid[i][H-1] = 1; }
    for(let i=0; i<H; i++) { grid[0][i] = 1; grid[W-1][i] = 1; }
}

function startGame() {
    showFullArt = false;
    overlay.style.display = 'none';
    currentImg.src = pokeGallery[(currentLevel - 1) % pokeGallery.length];
    initGrid();
    player = { x: 0, y: 0, dx: 0, dy: 0 };
    enemies = [];
    const speed = 0.6 + (currentLevel * 0.08);
    for(let i=0; i < currentLevel; i++) {
        // Spawnování kuliček dál od středu
        enemies.push({ 
            x: Math.random() > 0.5 ? 5 : W-5, 
            y: Math.random() > 0.5 ? 5 : H-5, 
            dx: speed * (Math.random() > 0.5 ? 1 : -1), 
            dy: speed * (Math.random() > 0.5 ? 1 : -1), 
            frozen: false 
        });
    }
    drawing = false; gameActive = true; canZap = true; timeLeft = 60;
    chargeEl.innerText = "PŘIPRAVEN"; chargeEl.style.color = "#0f0";
    clearInterval(timerInt);
    timerInt = setInterval(() => { if(gameActive) { timeLeft--; timerEl.innerText = timeLeft; if(timeLeft <= 0) finish(false, "ČAS VYPRŠEL!"); } }, 1000);
}

window.addEventListener('keydown', e => {
    if(!gameActive) return;
    if(e.code === 'Space' && canZap) {
        canZap = false; chargeEl.innerText = "VYBITO"; chargeEl.style.color = "#f00";
        enemies.forEach(en => en.frozen = true);
        setTimeout(() => { if(gameActive) enemies.forEach(en => en.frozen = false); }, 2500);
    }
    const k = e.key.toLowerCase();
    if((k==='arrowup'||k==='w') && player.dy===0) { player.dx=0; player.dy=-1; }
    if((k==='arrowdown'||k==='s') && player.dy===0) { player.dx=0; player.dy=1; }
    if((k==='arrowleft'||k==='a') && player.dx===0) { player.dx=-1; player.dy=0; }
    if((k==='arrowright'||k==='d') && player.dx===0) { player.dx=1; player.dy=0; }
});

function finish(win, msg) {
    gameActive = false; 
    if(win) {
        showFullArt = true; // Zapne režim prohlížení Pokémona
        setTimeout(() => {
            overlay.style.display = 'flex';
            document.getElementById('headline').innerText = "VÍTĚZSTVÍ!";
            document.getElementById('sub-msg').innerText = msg;
            currentLevel++;
            document.getElementById('cur-lvl').innerText = currentLevel;
        }, 3000); // Počkej 3 sekundy, než ukážeš menu
    } else {
        overlay.style.display = 'flex';
        document.getElementById('headline').innerText = "PROHRA!";
        document.getElementById('sub-msg').innerText = msg;
        currentLevel = 1;
        document.getElementById('cur-lvl').innerText = currentLevel;
    }
}

function floodFill() {
    let reach = Array(W).fill().map(() => Array(H).fill(false));
    enemies.forEach(en => {
        let q = [[Math.round(en.x), Math.round(en.y)]];
        while(q.length > 0) {
            let [x, y] = q.shift();
            if(x<0||x>=W||y<0||y>=H||grid[x][y]!==0||reach[x][y]) continue;
            reach[x][y] = true;
            q.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
        }
    });
    for(let x=0; x<W; x++) for(let y=0; y<H; y++) {
        if(grid[x][y]===0 && !reach[x][y]) grid[x][y]=1;
        if(grid[x][y]===2) grid[x][y]=1;
    }
    let filled = 0; grid.forEach(r => r.forEach(v => { if(v===1) filled++; }));
    let p = Math.floor((filled/(W*H))*100); percentEl.innerText = p;
    if(p >= 75) finish(true, "POKÉMON ODHALEN!");
}

function update() {
    if(!gameActive) return;
    let nx = player.x + player.dx, ny = player.y + player.dy;
    if(nx>=0 && nx<W && ny>=0 && ny<H) {
        player.x = nx; player.y = ny;
        if(grid[player.x][player.y]===0) { grid[player.x][player.y]=2; drawing=true; }
        else if(grid[player.x][player.y]===1 && drawing) { drawing=false; floodFill(); }
        else if(grid[player.x][player.y]===2) finish(false, "NARAZIL JSI DO SEBE!");
    }
    enemies.forEach(en => {
        if(!en.frozen) { en.x += en.dx; en.y += en.dy; }
        let bx=Math.round(en.x), by=Math.round(en.y);
        if(bx<=0 || bx>=W-1 || grid[bx][by] === 1) en.dx *= -1;
        if(by<=0 || by>=H-1 || grid[bx][by] === 1) en.dy *= -1;
        if(grid[bx][by]===2) finish(false, "POKÉBALL TĚ TREFIL!");
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. POKÉMON (Zvětšený)
    if (currentImg.complete) {
        const s = 0.85; const nw = canvas.width * s, nh = canvas.height * s;
        ctx.drawImage(currentImg, (canvas.width - nw) / 2, (canvas.height - nh) / 2, nw, nh);
    }

    // 2. MŘÍŽKA (Pokud není showFullArt)
    if(!showFullArt) {
        for(let x=0; x<W; x++) for(let y=0; y<H; y++) {
            if(grid[x][y] === 0) { 
                ctx.fillStyle = '#0a0a0a'; ctx.fillRect(x*SIZE, y*SIZE, SIZE, SIZE); 
            } else if(grid[x][y] === 2) { 
                ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; ctx.fillStyle = '#ffeb3b'; ctx.fillRect(x*SIZE, y*SIZE, SIZE, SIZE); ctx.shadowBlur = 0;
            }
        }
    }
    
    // 3. PIKAČU A KULIČKY
    if(gameActive && !showFullArt) {
        ctx.shadowBlur = 20; ctx.shadowColor = '#ffeb3b'; ctx.fillStyle = '#ffeb3b';
        ctx.beginPath(); ctx.arc(player.x*SIZE+5, player.y*SIZE+5, 8, 0, 7); ctx.fill();
        enemies.forEach(en => {
            ctx.shadowBlur = en.frozen ? 25 : 10; ctx.shadowColor = en.frozen ? '#0ff' : '#f00';
            ctx.fillStyle = en.frozen ? '#0ff' : '#f44336';
            ctx.beginPath(); ctx.arc(en.x*SIZE+5, en.y*SIZE+5, 7, 0, 7); ctx.fill();
        });
    }
    ctx.shadowBlur = 0;
    requestAnimationFrame(draw);
}

setInterval(update, 25);
initGrid();
draw();
</script>
</body>
</html>
